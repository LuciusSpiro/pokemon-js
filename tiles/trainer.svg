  <rect x="21" y="48" width="6" height="3" fill="#DC0A2D"/>
  <rect x="20" y="51" width="8" height="3" fill="#6B3A1F"/>
  <rect x="20" y="54" width="8" height="5" fill="#3B4CCA"/>
  <rect x="19" y="55" width="1" height="3" fill="#FFD5A0"/>
  <rect x="28" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="20" y="59" width="3" height="3" fill="#444"/>
  <rect x="25" y="59" width="3" height="4" fill="#444"/>
  <rect x="19" y="62" width="3" height="1" fill="#8B4513"/>
  <rect x="25" y="63" width="3" height="1" fill="#8B4513"/>

  <!-- Frame 2 up stand -->
  <rect x="37" y="48" width="6" height="3" fill="#DC0A2D"/>
  <rect x="36" y="51" width="8" height="3" fill="#6B3A1F"/>
  <rect x="36" y="54" width="8" height="5" fill="#3B4CCA"/>
  <rect x="35" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="44" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="37" y="59" width="3" height="4" fill="#444"/>
  <rect x="40" y="59" width="3" height="4" fill="#444"/>
  <rect x="37" y="63" width="3" height="1" fill="#8B4513"/>
  <rect x="40" y="63" width="3" height="1" fill="#8B4513"/>

  <!-- Frame 3 up walk -->
  <rect x="53" y="48" width="6" height="3" fill="#DC0A2D"/>
  <rect x="52" y="51" width="8" height="3" fill="#6B3A1F"/>
  <rect x="52" y="54" width="8" height="5" fill="#3B4CCA"/>
  <rect x="51" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="60" y="55" width="1" height="3" fill="#FFD5A0"/>
  <rect x="53" y="59" width="3" height="4" fill="#444"/>
  <rect x="56" y="59" width="3" height="3" fill="#444"/>
  <rect x="53" y="63" width="3" height="1" fill="#8B4513"/>
  <rect x="57" y="62" width="3" height="1" fill="#8B4513"/>
</svg>
