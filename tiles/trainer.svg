  <rect x="56" y="11" width="3" height="3" fill="#444"/>
  <rect x="53" y="15" width="3" height="1" fill="#8B4513"/>
  <rect x="57" y="14" width="3" height="1" fill="#8B4513"/>

  <!-- === ROW 1: FACING LEFT === -->
  <rect x="5" y="16" width="5" height="3" fill="#DC0A2D"/>
  <rect x="4" y="19" width="7" height="3" fill="#FFD5A0"/>
  <rect x="5" y="20" width="1" height="1" fill="#333"/>
  <rect x="4" y="22" width="7" height="5" fill="#3B4CCA"/>
  <rect x="3" y="22" width="1" height="4" fill="#FFD5A0"/>
  <rect x="5" y="27" width="3" height="4" fill="#444"/>
