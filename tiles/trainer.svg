  <rect x="53" y="16" width="5" height="3" fill="#DC0A2D"/>
  <rect x="52" y="19" width="7" height="3" fill="#FFD5A0"/>
  <rect x="53" y="20" width="1" height="1" fill="#333"/>
  <rect x="52" y="22" width="7" height="5" fill="#3B4CCA"/>
  <rect x="51" y="23" width="1" height="3" fill="#FFD5A0"/>
