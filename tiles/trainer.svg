  <rect x="21" y="16" width="5" height="3" fill="#DC0A2D"/>
  <rect x="20" y="19" width="7" height="3" fill="#FFD5A0"/>
  <rect x="21" y="20" width="1" height="1" fill="#333"/>
  <rect x="20" y="22" width="7" height="5" fill="#3B4CCA"/>
  <rect x="19" y="23" width="1" height="3" fill="#FFD5A0"/>
  <rect x="20" y="27" width="3" height="3" fill="#444"/>
  <rect x="24" y="27" width="2" height="4" fill="#444"/>
  <rect x="19" y="30" width="3" height="1" fill="#8B4513"/>
  <rect x="24" y="31" width="2" height="1" fill="#8B4513"/>

  <!-- Frame 2 left stand -->
  <rect x="37" y="16" width="5" height="3" fill="#DC0A2D"/>
  <rect x="36" y="19" width="7" height="3" fill="#FFD5A0"/>
  <rect x="37" y="20" width="1" height="1" fill="#333"/>
  <rect x="36" y="22" width="7" height="5" fill="#3B4CCA"/>
  <rect x="35" y="22" width="1" height="4" fill="#FFD5A0"/>
  <rect x="37" y="27" width="3" height="4" fill="#444"/>
  <rect x="40" y="27" width="2" height="4" fill="#444"/>
  <rect x="37" y="31" width="3" height="1" fill="#8B4513"/>
  <rect x="40" y="31" width="2" height="1" fill="#8B4513"/>

