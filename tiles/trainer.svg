  <rect x="4" y="51" width="8" height="3" fill="#6B3A1F"/><!-- hair back -->
  <rect x="4" y="54" width="8" height="5" fill="#3B4CCA"/>
  <rect x="3" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="12" y="54" width="1" height="4" fill="#FFD5A0"/>
  <rect x="5" y="59" width="3" height="4" fill="#444"/>
  <rect x="8" y="59" width="3" height="4" fill="#444"/>
  <rect x="5" y="63" width="3" height="1" fill="#8B4513"/>
  <rect x="8" y="63" width="3" height="1" fill="#8B4513"/>

