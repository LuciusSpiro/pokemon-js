  <rect x="26" y="36" width="1" height="1" fill="#333"/>
  <rect x="21" y="38" width="7" height="5" fill="#3B4CCA"/>
  <rect x="28" y="39" width="1" height="3" fill="#FFD5A0"/>
  <rect x="22" y="43" width="2" height="4" fill="#444"/>
  <rect x="25" y="43" width="3" height="3" fill="#444"/>
  <rect x="22" y="47" width="2" height="1" fill="#8B4513"/>
  <rect x="26" y="46" width="3" height="1" fill="#8B4513"/>

  <!-- Frame 2 right stand -->
  <rect x="38" y="32" width="5" height="3" fill="#DC0A2D"/>
  <rect x="37" y="35" width="7" height="3" fill="#FFD5A0"/>
  <rect x="42" y="36" width="1" height="1" fill="#333"/>
  <rect x="37" y="38" width="7" height="5" fill="#3B4CCA"/>
  <rect x="44" y="38" width="1" height="4" fill="#FFD5A0"/>
  <rect x="38" y="43" width="2" height="4" fill="#444"/>
  <rect x="40" y="43" width="3" height="4" fill="#444"/>
  <rect x="38" y="47" width="2" height="1" fill="#8B4513"/>
  <rect x="40" y="47" width="3" height="1" fill="#8B4513"/>

  <!-- Frame 3 right walk -->
  <rect x="54" y="32" width="5" height="3" fill="#DC0A2D"/>
  <rect x="53" y="35" width="7" height="3" fill="#FFD5A0"/>
  <rect x="58" y="36" width="1" height="1" fill="#333"/>
  <rect x="53" y="38" width="7" height="5" fill="#3B4CCA"/>
  <rect x="60" y="39" width="1" height="3" fill="#FFD5A0"/>
  <rect x="55" y="43" width="3" height="3" fill="#444"/>
  <rect x="53" y="43" width="2" height="4" fill="#444"/>
  <rect x="55" y="46" width="3" height="1" fill="#8B4513"/>
  <rect x="53" y="47" width="2" height="1" fill="#8B4513"/>

  <!-- === ROW 3: FACING UP === -->
